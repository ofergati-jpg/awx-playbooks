---
- name: Hello World Sample
  hosts: all
  tasks:
    - name: Write success to file
      copy:
        content: "success\n"
        dest: /tmp/ansible_output.txt

    - name: Print file content
      shell: cat /tmp/ansible_output.txt
      register: file_content

    - name: Show result
      debug:
        msg: "{{ file_content.stdout }}"
